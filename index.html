<script>
const framework = [
  {
    domain: "Word Recognition",
    strands: [
      "Phonemic Awareness & Phonics",
      "Recognition of Words at Sight"
    ]
  },
  {
    domain: "Bridging Processes",
    strands: [
      "Fluency",
      "Vocabulary",
      "Morphology",
      "Strategy Use"
    ]
  },
  {
    domain: "Comprehension",
    strands: [
      "Background and Content Knowledge",
      "Structures and Features of Text",
      "Language Structure (syntax, semantics)"
    ]
  },
  {
    domain: "Writing",
    strands: [
      "Transcription (Handwriting, Spelling, Punctuation)",
      "Composition (Structure, Organization, Genres, Ideas, Process, Sentence Construction, Syntax, Grammar, Usage, Craft, Audience, Purpose)"
    ]
  },
  {
    domain: "Talk",
    strands: [
      "Presentational",
      "Exploratory"
    ]
  }
];

const grid = document.getElementById("grid");

function render() {
  grid.innerHTML = "";

  framework.forEach(section => {
    const card = document.createElement("div");
    card.className = "card";

    let strandsHTML = section.strands
      .map(s => `<li>${s}</li>`)
      .join("");

    card.innerHTML = `
      <div class="code">${section.domain}</div>
      <ul>${strandsHTML}</ul>
    `;

    grid.appendChild(card);
  });
}

render();
</script>

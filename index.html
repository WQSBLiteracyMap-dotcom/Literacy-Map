<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Western Quebec School Board Literacy Map (Grades 1–6)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

secondary:#0e7490;<style>
  --bg:#f4f7f9;
  --card:#ffffff;
  --ink:#20323a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter, system-ui, sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.6;
}

h1,h2,h3{font-weight:600}
p{margin:.45rem 0}

/* ===== MASTHEAD ===== */
.masthead{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
  padding:2.2rem;
  display:flex;
  gap:2rem;
  align-items:center;
}

.masthead img{
  height:110px;
}

.masthead h1{
  margin:0;
  font-family:"Source Serif 4",serif;
  font-size:2.4rem;
}

.masthead h2{
  margin:.3rem 0 0;
  font-size:1rem;
  font-weight:400;
  color:#d1f1f5;
}

/* ===== TOP NAV ===== */
.nav{
  background:white;
  border-bottom:1px solid #dbe5e8;
  padding:.8rem 2rem;
  display:flex;
  gap:1.5rem;
}

.nav button{
  background:none;
  border:none;
  font-size:.9rem;
  cursor:pointer;
  color:#375f66;
}

.nav button.active{
  font-weight:600;
  color:var(--secondary);
  border-bottom:2px solid var(--secondary);
}

/* ===== LAYOUT ===== */
main{
  max-width:1200px;
  margin:2rem auto;
  padding:0 2rem;
}

.section{
  background:var(--card);
  border-radius:12px;
  padding:2rem;
  margin-bottom:2.5rem;
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.section h2{
  margin-top:0;
  border-bottom:3px solid var(--secondary);
  padding-bottom:.3rem;
}

/* ===== TABLES ===== */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:1.2rem;
}
th,td{
  border:1px solid #ccc;
  padding:.7rem;
  vertical-align:top;
}
th{background:#eef7fa}

/* ===== HIDE ===== */
.hidden{display:none}

/* ===== PRINT ===== */
@media print{
  .nav{display:none}
  body{background:white}
}
</style>
</head>

<script>
function showView(id){
  document.getElementById('scope').classList.add('hidden');
  document.getElementById('competencies').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');

  document.querySelectorAll('.nav button')
    .forEach(b=>b.classList.remove('active'));

  event.target.classList.add('active');
}

function showCycle(id){
  document.querySelectorAll('#competencies > .section > div')
    .forEach(v=>v.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
</script>
